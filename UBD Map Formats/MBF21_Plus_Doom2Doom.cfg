/*************************************************************\
  Doom Builder 2 Game Configuration for ZDoom-compatible port
\*************************************************************/

// This is required to prevent accidental use of a different configuration
type = "Doom Builder 2 Game Configuration";

// This is the title to show for this game
game = "MBF21 Plus : Doom 2 (Doom format)";

// This is the simplified game engine/sourceport name
engine = "mbf21";

// Should this configuration be initially available?
enabledbydefault = true;

// *******************************************************
// *                                                     *
// *   Note: all the elements that could be factorized   *
// *   because they were common to ZDoom, GZDoom and     *
// *   Zandronum have been moved to ZDoom_common.cfg.     *
// *                                                     *
// *******************************************************

// STANDARD DOOM SETTINGS
// Settings common to all games and all map formats
include("Includes\\Doom_common.cfg", "common");

// Settings common to Doom map format
include("Includes\\Boom_common.cfg", "mapformat_doom");
include("Includes\\MBF21_common.cfg", "mapformat_doom");

// Settings common to Doom games
include("Includes\\Game_Doom.cfg");

// Map name format for Doom 2.
mapnameformat = "MAPxy";

//mxd. No DECORATE support in vanilla
decorategames = "";

// Default thing filters
// (these are not required, just useful for new users)
thingsfilters
{
  include("Includes\\Doom_misc.cfg", "thingsfilters");
}

// THING TYPES
// Each engine has its own additional thing types
// Order should always be 1: Game; 2: ZDoom/game; 3: ZDoom/zdoom
thingtypes
{
  // Basic game actors
  include("Includes\\Doom_things.cfg");
  include("Includes\\Doom2_things.cfg");
  include("Includes\\Boom_things.cfg");
}

// ENUMERATIONS
// Each engine has its own additional thing types
// These are enumerated lists for linedef types and UDMF fields.
enums
{
  // Basic game enums
  include("Includes\\Doom_misc.cfg", "enums");
}

// Dehacked data
dehacked
{
  include("Includes\\Dehacked_Doom.cfg");
}

// --------------- Custom Types ---------------
linedeftypes
{
	elfbsp
	{
		title = "elfBSP";

		1080 { title = "Increment segment angle by degrees defined in line tag"; }
		1081 { title = "Set segment angle to degrees defined in line tag"; }
		1082 { title = "Increment segment angle to BAM defined in line tag"; }
		1083 { title = "Set segment angle to BAM defined in line tag"; }

		1084 { title = "Do not render segment for this linedef on the front/right side"; }
		1085 { title = "Do not render segment for this linedef on the back/left side"; }
		1086 { title = "Do not render segment for this linedef on either side"; }

		1087 { title = "Do not split segment for this line"; }
	}
	
elfbsptags
{
	title = "elfBSP-TAGS-(tags not specials)";
		997	{ title = "Forcibly block the reject table from seeing through this two-sided line"; }
		998	{ title = "Do not render segments for this linedef"; }
		999	{ title = "Do not add this linedef to the blockmap"; }
}

	id24music
	{
		title = "ID24-Music";

		2057 { title = "W1 Change music and make it loop only if a track is defined"; }
		2058 { title = "WR Change music and make it loop only if a track is defined"; }
		2059 { title = "S1 Change music and make it loop only if a track is defined"; }
		2060 { title = "SR Change music and make it loop only if a track is defined"; }
		2061 { title = "G1 Change music and make it loop only if a track is defined"; }
		2062 { title = "GR Change music and make it loop only if a track is defined"; }

		2063 { title = "W1 Change music and make it play only once"; }
