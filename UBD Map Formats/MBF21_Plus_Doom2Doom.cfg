		2067 { title = "G1 Change music and make it play only once"; }
		2068 { title = "GR Change music and make it play only once"; }

		2087 { title = "W1 Change music and make it loop, reset to looping default if no track defined"; }
		2088 { title = "WR Change music and make it loop, reset to looping default if no track defined"; }
		2089 { title = "S1 Change music and make it loop, reset to looping default if no track defined"; }
		2090 { title = "SR Change music and make it loop, reset to looping default if no track defined"; }
		2091 { title = "G1 Change music and make it loop, reset to looping default if no track defined"; }
