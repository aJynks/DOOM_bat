/* ========================================================================== */
/* ===== New Additional Make Targets ======================================== */
/* ========================================================================== */

/****************************************************************************
 * TARGET: releasenopatch
 ****************************************************************************
 * Builds and packages the project WITHOUT compiling/merging DeHackEd.
 * doommake release-nopatch
 ****************************************************************************/
check entry releasenopatch(args) {
    doInit();
    doAllNoPatch();
	doTexturesAll();
	doTexturesRestricted();
	doEditorRestricted();
	doEditorAll();
    doReleaseNoPatch();
    doDist();
}

/****************************************************************************
 * TARGET: nopatch
 ****************************************************************************
 * Builds and packages the project WITHOUT compiling/merging DeHackEd.
 * doommake nopatch
 ****************************************************************************/
check entry nopatch(args) {
    doInit();
    doAllNoPatch();
    doReleaseNoPatch();
}

/****************************************************************************
 * TARGET: deco
 ****************************************************************************
 * Creates a WAD containing only the DEHACKED lump.
 * doommake deco
 ****************************************************************************/
check entry deco(args) {
    doPatch(false);
    doDehWad();
}

/****************************************************************************
 * TARGET: fresh
 ****************************************************************************
 * CLEANS the ./build dir, and then runs MAKE for the entire project
 * doommake fresh
 ****************************************************************************/
check entry fresh(args) {
    doClean();
    doInit();
    doAll();
    doRelease();
}

/****************************************************************************
 * TARGET: texrestricted
 ****************************************************************************
 * Converts and reads the texture assets and merges them into a WAD using
 * the Restricted texture list.
 * doommake texrestricted
 ****************************************************************************/
check entry texrestricted(args) {
	doConvertFlats();
	doConvertPatches();
	doConvertTextures();
	doTexturesRestricted();
}

/****************************************************************************
 * TARGET: texall
 ****************************************************************************
 * Converts and reads the texture assets and merges them into a WAD using
 * the All texture list.
 * doommake texall
 ****************************************************************************/
check entry texall(args) {
	doConvertFlats();
	doConvertPatches();
	doConvertTextures();
	doTexturesAll(true);
}

/****************************************************************************
 * TARGET: playpal
 ****************************************************************************
 * Converts palettes and colormaps, then merges them into palette.wad.
 * This creates a WAD containing ONLY palette and colormap data.
 * Usage: doommake palette
 ****************************************************************************/
check entry playpal(args) {
	doInit();
	doConvertPalettes();
	doConvertColormaps();
	doPalette();
}

/****************************************************************************
 * TARGET: UDB
 ****************************************************************************
 * Same result as `editor` but never deletes the WAD — wadmerge's
 * create/finish overwrites it in place. Forces a rebuild by skipping
 * doEditorAssets()'s build-status gate.
 * doommake editorrestricted
 ****************************************************************************/
check entry udb(args) {
	doInit();
	doAll();
	doTexturesRestricted();
	doEditorRestricted();
	doRelease();
}

/****************************************************************************
 * TARGET: editorrestricted
 ****************************************************************************
 * Same result as `editor` but never deletes the WAD — wadmerge's
 * create/finish overwrites it in place. Forces a rebuild by skipping
 * doEditorAssets()'s build-status gate.
 * doommake editorrestricted
 ****************************************************************************/
check entry editorrestricted(args) {
	doInit();
	doAll();
	doEditorRestricted();
}

/****************************************************************************
 * TARGET: editorall
 ****************************************************************************
 * Builds editor-assets-all.wad: identical components to the editor WAD but
 * using the full (All) texture set instead of Restricted. Never overwrites
 * textures.wad. Overwrites the output in place (create/finish); creates it
 * if it doesn't exist.
 * doommake editorall
 ****************************************************************************/
check entry editorall(args) {
	doInit();
	doAll();
	doTexturesAll();
	doEditorAll();
}

